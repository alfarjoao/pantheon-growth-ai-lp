<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pantheon Growth — Agency AI Operating System</title>
    <meta name="description" content="Pantheon Growth — Agency AI Operating System. CRM, Finance, AI Agents and Projects in one workspace." />
    <meta name="theme-color" content="#B68B4A" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-size: 16px; }
      body {
        background: #000000;
        color: #F2EFE9;
        font-family: 'Inter', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      #root { min-height: 100vh; display: flex; flex-direction: column; }
      :root {
        --font: 'Inter', system-ui, sans-serif;
        --void: #000000; --base: #000000; --surface: #000000; --raised: #050505;
        --gold: #b99f65; --gold-lt: #ccb07a; --gold-dk: #8a7040;
        --t1: #F2EFE9; --t2: #888480; --t3: #484440; --t4: rgba(255,255,255,.22);
        --gold-bg: rgba(185,159,101,.06); --gold-bd: rgba(185,159,101,.18);
        --gold-g: linear-gradient(135deg,#b99f65,#ccb07a);
        --border: rgba(255,255,255,.08); --border2: rgba(255,255,255,.12); --border3: rgba(255,255,255,.18);
        --red: #C05050; --green: #4A9660; --blue: #b99f65; --orange: #b99f65; --purple: #b99f65;
        --r: 7px; --r-md: 9px; --r-lg: 13px; --r-xl: 17px; --r-2xl: 22px;
      }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border3); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--t4); }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
      @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
      @keyframes fadeIn { from{opacity:0} to{opacity:1} }
      @keyframes spin { to{transform:rotate(360deg)} }
      @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
      @keyframes slideIn { from{transform:translateX(-8px);opacity:0} to{transform:translateX(0);opacity:1} }
      @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
